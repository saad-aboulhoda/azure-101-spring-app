<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center vh-100">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow">
          <div class="card-body">
            <h3 class="text-center mb-4">Login or Register</h3>
            <p class="text-muted text-center small">Enter your details. If you don't exist, we'll prompt you to
              register!</p>

            <div th:if="${param.error}" class="alert alert-danger">Invalid credentials!</div>

            <form th:action="@{/auth/process}" method="post">
              <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
              </div>
              <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Continue</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
