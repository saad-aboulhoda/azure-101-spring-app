<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Create Account?</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center vh-100">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow border-warning">
          <div class="card-body text-center">
            <h4 class="card-title text-warning mb-3">User Not Found</h4>
            <p>The username <strong><span th:text="${session.temp_user}"></span></strong> does not exist.</p>
            <p>Would you like to create an account with the password you just entered?</p>

            <div class="d-flex justify-content-center gap-3 mt-4">
              <a href="/login" class="btn btn-secondary">No, go back</a>
              <form th:action="@{/auth/register-confirm}" method="post">
                <button type="submit" class="btn btn-success">Yes, Create Account</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
