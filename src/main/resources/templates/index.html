<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <title>ImageBoard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">ImageBoard</a>
      <div>
        <!-- Show Login if Guest, Show 'New Post' & Logout if Logged In -->
        <a sec:authorize="isAnonymous()" href="/login" class="btn btn-outline-light">Login / Register</a>

        <span sec:authorize="isAuthenticated()">
          <a href="/posts/new" class="btn btn-primary me-2">New Post</a>
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-outline-light" type="submit">Logout</button>
          </form>
        </span>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <!-- Loop through posts -->
        <div th:each="post : ${posts}" class="card mb-4 shadow-sm">
          <div class="card-body">
            <h5 class="card-title" th:text="${post.title}">Post Title</h5>
            <p class="text-muted small">Posted by <span th:text="${post.author.username}">User</span></p>
          </div>
          <!-- Image loaded from Azure Blob -->
          <img th:src="${post.imageUrl}" class="card-img-top" alt="Post Image">

          <div class="card-footer d-flex align-items-center">
            <!-- Voting Forms -->
            <form th:action="@{/posts/{id}/vote(id=${post.id})}" method="post" class="me-2">
              <input type="hidden" name="isUpvote" value="true">
              <button type="submit" class="btn btn-outline-success btn-sm">▲ Up (<span
                  th:text="${post.upvotes}"></span>)</button>
            </form>

            <h4 class="mb-0 mx-3" th:text="${post.score}">0</h4>

            <form th:action="@{/posts/{id}/vote(id=${post.id})}" method="post" class="ms-2">
              <input type="hidden" name="isUpvote" value="false">
              <button type="submit" class="btn btn-outline-danger btn-sm">▼ Down (<span
                  th:text="${post.downvotes}"></span>)</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
