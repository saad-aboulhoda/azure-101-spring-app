<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>New Post</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-header bg-primary text-white">Create a New Post</div>
          <div class="card-body">
            <!-- enctype="multipart/form-data" is required for file uploads! -->
            <form th:action="@{/posts/create}" method="post" enctype="multipart/form-data">
              <div class="mb-3">
                <label class="form-label">Post Title</label>
                <input type="text" name="title" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Image File</label>
                <input class="form-control" type="file" name="file" accept="image/*" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Upload and Post</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
